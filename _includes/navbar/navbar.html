<button id="{{ include.nav_id }}-button" class="uw-mobile-menu-button-bar uw-mobile-menu-button-bar-reversed uw-is-closed" data-menu="{{ include.nav_id }}" aria-label="Open menu" aria-expanded="true" aria-controls="{{ include.nav_id }}">{{ include.menu_name | default: "Menu" }}<svg aria-hidden="true" focusable="false"><use xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#uw-symbol-menu"></use></svg><svg aria-hidden="true" focusable="false"><use xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#uw-symbol-close"></use></svg></button>
<div id="{{ include.nav_id }}" class="uw-is-visible uw-horizontal" aria-hidden="false">
    <div class="uw-main-nav">
        <nav class="uw-nav-menu uw-nav-menu-reverse" aria-label="Main Menu">
            <ul id="{{ include.ul_id }}">
                <div class="uw-header-crest">
                    <a href="{{ '/' | relative_url }}"><img class="uw-crest-svg py-2" src="{{'/images/logos/CHTC_Logo_Full_Color.svg' | relative_url}}" alt="Link to CHTC Home Page"></a>
                </div>
                <div class="border-start border-primary border-2 align-self-stretch my-2">

                </div>
                <div class="d-none d-lg-flex align-items-center gap-1 ps-2">
                    <a href="https://cdis.wisc.edu/" target="_blank" rel="noopener noreferrer">
                        <img src="{{ '/images/logos/UW_Crest.svg' | relative_url }}" height="40" width="35" class="uw-logo-svg" alt="Link to UW-Madison Home Page">
                    </a>
                    <a href="https://morgridge.org" target="_blank" rel="noopener noreferrer">
                        <img src="{{ '/images/logos/Morgridge_Logo.svg' | relative_url }}" height="40" width="65" class="uw-logo-svg" alt="Link to Morgridge Home Page">
                    </a>
                </div>
                {% for nav_item in nav_items %}
                    {% include navbar/nav-item.html%}
                {% endfor %}
                <li class="my-auto ms-auto me-0 pe-0">
                    <div id="main-search-bar" class="search-bar">
                        <input type="text" class="form-control" placeholder="Loading..." aria-describedby="button-addon2">
                        <div id="results-dropdown" class="results-dropdown w-100">
                            <div class="search-results" hidden></div>
                        </div>
                    </div>
                </li>
            </ul>
        </nav>
    </div>
</div>
