title: Machine Learning Research Computing Facilitator
text: |
  The Center for High Throughput Computing (CHTC) is hiring a Machine Learning Research Computing Facilitator to join the Research Computing Facilitation team. CHTC’s Research Computing Facilitation team introduces researchers to large-scale computational approaches and enables their use of large-scale computing systems like CHTC's in-house clusters and the Open Science Pool and PATh Facility (operated by the NSF Partnership to Advance Throughput Computing (PATh) project). The Machine Learning Facilitator role complements the existing Facilitation team by providing specific support to researchers regarding AI/machine learning (ML) methods and implementation on shared computing systems.
type: Full Time
institution: University of Wisconsin–Madison
